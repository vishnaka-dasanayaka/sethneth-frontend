<!-- Modal Backdrop -->
<div
  *ngIf="showModal"
  class="fixed inset-0 bg-black/50 z-100 flex items-center justify-center"
>
  <!-- Modal Container -->
  <div class="bg-white rounded-lg shadow-lg w-full max-w-4xl mx-auto z-50">
    <!-- Modal Header -->
    <div class="flex justify-between items-center px-6 py-4 border-b">
      <h4 class="text-xl font-semibold text-gray-800">
        Submit Attendance for Another
      </h4>
      <button
        type="button"
        class="text-gray-500 hover:text-red-600 text-xl"
        (click)="closeModal()"
      >
        &times;
      </button>
    </div>

    <!-- Modal Body -->
    <div class="px-6 py-4">
      <form
        [formGroup]="valForm"
        (ngSubmit)="submitForm(valForm.value)"
        class="space-y-4"
      >
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1 text-gray-700"
              >User
              <i class="fa-solid fa-asterisk fa-2xs" style="color: #ff0000"></i
            ></label>
            <p-select
              [options]="users"
              formControlName="user"
              [checkmark]="true"
              optionLabel="label"
              optionValue="value"
              [showClear]="true"
              placeholder="Select a Supplier"
              class="w-full"
              [filter]="true"
              (ngModelChange)="getDataRow()"
            />
            <span
              class="text-red-500 text-xs"
              *ngIf="
                valForm.controls['user'].hasError('required') &&
                (valForm.controls['user'].dirty ||
                  valForm.controls['user'].touched)
              "
              >This field is required</span
            >
          </div>

          <div>
            <label class="block text-sm font-medium mb-1 text-gray-700"
              >Date
              <i class="fa-solid fa-asterisk fa-2xs" style="color: #ff0000"></i
            ></label>
            <p-datepicker
              formControlName="date"
              class="w-full"
              [inputStyle]="{ width: '100%' }"
              (ngModelChange)="getDataRow()"
            />
            <span
              class="text-red-500 text-xs"
              *ngIf="
                valForm.controls['date'].hasError('required') &&
                (valForm.controls['date'].dirty ||
                  valForm.controls['date'].touched)
              "
              >This field is required</span
            >
          </div>
        </div>

        <div
          *ngIf="show_input_fileds"
          class="grid grid-cols-1 md:grid-cols-2 gap-4"
        >
          <div>
            <label class="block text-sm font-medium mb-1 text-gray-700"
              >Checkin Time
              <i class="fa-solid fa-asterisk fa-2xs" style="color: #ff0000"></i
            ></label>

            <p-datepicker
              formControlName="checkin_time"
              class="w-full"
              [inputStyle]="{ width: '100%' }"
              inputId="calendar-timeonly"
              [timeOnly]="true"
            />
            <span
              class="text-red-500 text-xs"
              *ngIf="
                valForm.controls['checkin_time'].hasError('required') &&
                (valForm.controls['checkin_time'].dirty ||
                  valForm.controls['checkin_time'].touched)
              "
              >This field is required</span
            >
          </div>

          <div>
            <label class="block text-sm font-medium mb-1 text-gray-700"
              >Checkout Time
            </label>

            <p-datepicker
              formControlName="checkout_time"
              class="w-full"
              [inputStyle]="{ width: '100%' }"
              inputId="calendar-timeonly"
              [timeOnly]="true"
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1 text-gray-700"
              >Branch
              <i class="fa-solid fa-asterisk fa-2xs" style="color: #ff0000"></i
            ></label>
            <p-select
              [options]="branch_list"
              formControlName="branch"
              [checkmark]="true"
              optionLabel="label"
              optionValue="value"
              [showClear]="true"
              placeholder="Select a branch"
              class="w-full"
              [filter]="true"
            />
            <span
              class="text-red-500 text-xs"
              *ngIf="
                valForm.controls['branch'].hasError('required') &&
                (valForm.controls['branch'].dirty ||
                  valForm.controls['branch'].touched)
              "
              >This field is required</span
            >
          </div>
        </div>

        <div class="flex justify-end space-x-2 pt-4">
          <button
            type="button"
            class="px-4 py-2 border rounded text-gray-700 border-gray-400 hover:bg-gray-100"
            (click)="closeModal()"
          >
            Close
          </button>
          <button
            *ngIf="show_input_fileds"
            type="submit"
            class="px-5 py-2 rounded text-white"
            [ngClass]="
              valForm.valid
                ? 'bg-orange-500 hover:bg-orange-600'
                : 'bg-orange-400 cursor-not-allowed'
            "
            [disabled]="valForm.invalid"
          >
            Submit
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
